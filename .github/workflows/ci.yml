name: CI/CD

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build, test and validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Validate Dockerfile build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DockerFile
          platforms: linux/amd64
          tags: auth-services-app:ci
          push: false

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: DockerFile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/auth-services-app:latest
            ghcr.io/${{ github.repository_owner }}/auth-services-app:${{ github.sha }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment: EC2_HOST

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd ~/auth-services
            git pull origin master
            docker compose down
            docker compose up -d --build